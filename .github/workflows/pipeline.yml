name: pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d
        with:
          install: true
          cache: true
          experimental: true

      - id: pnpm-cache-path
        name: pnpm cache path
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - id: pnpm-cache
        name: restore pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ steps.pnpm-cache-path.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Set up SSH
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" >> ~/.ssh/known_hosts
        env:
          DEPLOY_KEY: ${{ secrets.REMOTE_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}

      - name: Sync to server
        if: ${{ github.ref == 'refs/heads/main' }}
        run: rsync -rlptcv --delete --chmod=D2755,F644 dist/ $USER@$HOST:eons.io/
        env:
          USER: ${{ secrets.REMOTE_USER }}
          HOST: ${{ secrets.REMOTE_HOST }}
